apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# List of resource files to include
resources:
  - namespace.yaml
  - deployment.yaml

# Namespace transformer
# All resources will be deployed into this namespace
namespace: sample

# Images transformer
# Change the name, tag, or registry of images
images:
  - name: sample
    newName: nvcr.io/ngc-org/ngc-team/alpine-k8s
    newTag: 1.30.12
