apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: node-tuning
  namespace: kube-system
spec:
  selector:
    matchLabels:
      app: node-tuning
  template:
    metadata:
      labels:
        app: node-tuning
    spec:
      hostPID: true
      tolerations:
        - operator: Exists
      initContainers:
        - name: sysctl
          image: alpine:3.21
          securityContext:
            privileged: true
          command:
            - sh
            - -c
            - |
              set -e
              sysctl -w fs.inotify.max_user_instances=1024
              sysctl -w fs.inotify.max_user_watches=1048576
      containers:
        - name: pause
          image: registry.k8s.io/pause:3.10
