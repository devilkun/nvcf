# Install only CRDs, disable all other components
crds:
  enabled: true

# Disable all Prometheus Operator components
prometheusOperator:
  enabled: false

# Disable Prometheus instance
prometheus:
  enabled: false

# Disable Alertmanager
alertmanager:
  enabled: false

# Disable Grafana
grafana:
  enabled: false

# Disable kube-state-metrics (we'll install it separately)
kubeStateMetrics:
  enabled: false

# Disable node-exporter
nodeExporter:
  enabled: false

# Disable prometheus-node-exporter
prometheus-node-exporter:
  enabled: false
