# Source: fake-gpu-operator/templates/status-exporter/hostpath-init-configmap.yaml
apiVersion: v1
kind: ConfigMap
metadata:
    name: hostpath-init
data:
    init.sh: |
        #!/bin/bash

        set -e

        RUNAI_DIR=/runai

        # Allow containers to read/write to RUNAI_DIR
        chmod 777 $RUNAI_DIR
        chcon -Rt svirt_sandbox_file_t $RUNAI_DIR || echo "Failed to set SELinux context, this is expected if SELinux is not enabled"
---
