apiVersion: v1
data:
  topology.yml: |-
    migStrategy: mixed
    nodePoolLabelKey: run.ai/simulated-gpu-node-pool
    nodePools:
      default:
        gpuCount: 128
        gpuMemory: 81559
        gpuProduct: NVIDIA-H100-SXM4-80GB
kind: ConfigMap
metadata:
  name: topology
