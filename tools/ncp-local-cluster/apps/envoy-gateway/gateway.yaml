---
# Gateway resource for Envoy Gateway
# This is the entry point for HTTPRoutes to attach to
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: shared-gw
  namespace: envoy-gateway-system
spec:
  gatewayClassName: eg
  listeners:
    - name: http
      protocol: HTTP
      port: 80
      allowedRoutes:
        namespaces:
          from: All
    - name: nats
      protocol: TCP
      port: 4222
      allowedRoutes:
        namespaces:
          from: All
