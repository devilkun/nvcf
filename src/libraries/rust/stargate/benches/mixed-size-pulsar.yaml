name: mixed-size-pulsar
metadata:
  description: Small and large request mix with PULSAR and KV-cache metrics enabled.
  tags: [mixed-size, heterogeneous, cache, pulsar]
  expected_runtime: medium
  expected_signal: Token-weighted metrics should show how large requests affect capacity ownership and cache behavior.
model: dummy-model
seed: 303
request_count: 120
max_concurrency: 32

stargates:
  count: 1

backends:
  count: 6
  profile:
    name: balanced
    weight: 1.0
    max_concurrent_requests: 4
    kv_cache_capacity_tokens: 150000
    service_time_ms:
      ttft_mean: 170
      ttft_jitter_ms: 20
      decode_jitter_ms: 4
      prefill_tokens_per_s: 4000
      decode_tokens_per_s: 90
    registration:
      last_mean_input_tps: 120
  profiles:
    - count: 2
      profile:
        name: high-throughput
        weight: 1.8
        max_concurrent_requests: 6
        kv_cache_capacity_tokens: 300000
        service_time_ms:
          ttft_mean: 120
          ttft_jitter_ms: 15
          decode_jitter_ms: 2
          prefill_tokens_per_s: 8000
          decode_tokens_per_s: 160
        registration:
          last_mean_input_tps: 260
    - count: 3
      profile:
        name: balanced
        weight: 1.0
        max_concurrent_requests: 4
        kv_cache_capacity_tokens: 150000
        service_time_ms:
          ttft_mean: 170
          ttft_jitter_ms: 20
          decode_jitter_ms: 4
          prefill_tokens_per_s: 4000
          decode_tokens_per_s: 90
        registration:
          last_mean_input_tps: 120
    - count: 1
      profile:
        name: small-cache
        weight: 0.6
        max_concurrent_requests: 3
        kv_cache_capacity_tokens: 60000
        service_time_ms:
          ttft_mean: 230
          ttft_jitter_ms: 35
          decode_jitter_ms: 6
          prefill_tokens_per_s: 2600
          decode_tokens_per_s: 70
        registration:
          last_mean_input_tps: 80

traffic_pattern:
  kind: mixed_size
  routing_keys: 0
  cache_affinity_keys: 240
  arrival:
    distribution: poisson
    target_rps: 8
  small_share: 0.8
  small:
    input_tokens:
      distribution: lognormal
      mean: 700
      sigma: 0.4
      p99_cap: 3000
    output_tokens:
      distribution: lognormal
      mean: 96
      sigma: 0.35
      p99_cap: 512
  large:
    input_tokens:
      distribution: lognormal
      mean: 6000
      sigma: 0.5
      p99_cap: 20000
    output_tokens:
      distribution: lognormal
      mean: 384
      sigma: 0.45
      p99_cap: 2048

algorithms:
  - name: power-of-two
    config:
      default: power-of-two
  - name: groq-multiregion
    config:
      default: groq-multiregion
  - name: pulsar
    config:
      default: power-of-two
      models:
        dummy-model:
          algorithm: pulsar
          seed: mixed-size-v1
          require_cache_affinity_key: true
          require_input_tokens: true
          require_kv_metrics: true
