name: backend-degradation
metadata:
  description: Runner-controlled backend pod deletion during replay to inspect routing recovery.
  tags: [degradation, recovery, heterogeneous]
  expected_runtime: medium
  expected_signal: Algorithms should continue routing through remaining active backends after a backend pod is deleted.
model: dummy-model
seed: 808
request_count: 120
max_concurrency: 32

stargates:
  count: 1

backends:
  count: 6
  profile:
    name: balanced
    weight: 1.0
    max_concurrent_requests: 4
    kv_cache_capacity_tokens: 120000
    service_time_ms:
      ttft_mean: 170
      ttft_jitter_ms: 25
      decode_jitter_ms: 4
      prefill_tokens_per_s: 4200
      decode_tokens_per_s: 90
    registration:
      last_mean_input_tps: 120
  profiles:
    - count: 2
      profile:
        name: fast
        weight: 1.5
        max_concurrent_requests: 6
        kv_cache_capacity_tokens: 200000
        service_time_ms:
          ttft_mean: 120
          ttft_jitter_ms: 15
          decode_jitter_ms: 2
          prefill_tokens_per_s: 7000
          decode_tokens_per_s: 140
        registration:
          last_mean_input_tps: 220
    - count: 4
      profile:
        name: balanced
        weight: 1.0
        max_concurrent_requests: 4
        kv_cache_capacity_tokens: 120000
        service_time_ms:
          ttft_mean: 170
          ttft_jitter_ms: 25
          decode_jitter_ms: 4
          prefill_tokens_per_s: 4200
          decode_tokens_per_s: 90
        registration:
          last_mean_input_tps: 120

degradation:
  actions:
    - at_request: 50
      backend_index: 0
      action: delete_backend_pod

traffic_pattern:
  kind: zipf_hotset
  routing_keys: 0
  cache_affinity_keys: 120
  hotset_fraction: 0.25
  hotset_share: 0.85
  input_tokens:
    distribution: lognormal
    mean: 1000
    sigma: 0.5
    p99_cap: 5000
  output_tokens:
    distribution: lognormal
    mean: 120
    sigma: 0.4
    p99_cap: 512
  arrival:
    distribution: poisson
    target_rps: 6

algorithms:
  - name: power-of-two
    config:
      default: power-of-two
  - name: groq-multiregion
    config:
      default: groq-multiregion
  - name: pulsar
    config:
      default: power-of-two
      models:
        dummy-model:
          algorithm: pulsar
          seed: backend-degradation-v1
          require_cache_affinity_key: true
          require_input_tokens: true
          require_kv_metrics: true
