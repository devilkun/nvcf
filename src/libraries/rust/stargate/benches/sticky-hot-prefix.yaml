name: sticky-hot-prefix
metadata:
  description: Very small hotset with high reuse to highlight cache locality and routing stickiness.
  tags: [cache, sticky, hotset, pulsar]
  expected_runtime: short
  expected_signal: Cache-aware algorithms should show high cache hit rate and low cache-key movement.
model: dummy-model
seed: 707
request_count: 120
max_concurrency: 24

stargates:
  count: 1

backends:
  count: 6
  profile:
    name: balanced-cache
    weight: 1.0
    max_concurrent_requests: 4
    kv_cache_capacity_tokens: 250000
    service_time_ms:
      ttft_mean: 160
      ttft_jitter_ms: 20
      decode_jitter_ms: 3
      prefill_tokens_per_s: 4500
      decode_tokens_per_s: 95
    registration:
      last_mean_input_tps: 130

traffic_pattern:
  kind: zipf_hotset
  routing_keys: 0
  cache_affinity_keys: 16
  hotset_fraction: 0.25
  hotset_share: 0.95
  input_tokens:
    distribution: lognormal
    mean: 1600
    sigma: 0.45
    p99_cap: 6000
  output_tokens:
    distribution: lognormal
    mean: 100
    sigma: 0.35
    p99_cap: 512
  arrival:
    distribution: poisson
    target_rps: 6

algorithms:
  - name: power-of-two
    config:
      default: power-of-two
  - name: round-robin
    config:
      default: round-robin
  - name: pulsar
    config:
      default: power-of-two
      models:
        dummy-model:
          algorithm: pulsar
          seed: sticky-hot-prefix-v1
          require_cache_affinity_key: true
          require_input_tokens: true
          require_kv_metrics: true
