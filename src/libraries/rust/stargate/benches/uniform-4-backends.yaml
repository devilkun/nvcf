name: uniform-4-backends
metadata:
  description: Homogeneous baseline with evenly shaped traffic and no specialized cache behavior.
  tags: [smoke, homogeneous, uniform]
  expected_runtime: short
  expected_signal: Load balancers should spread requests evenly with high success rate.
model: dummy-model
seed: 101
request_count: 64
max_concurrency: 16

stargates:
  count: 1

backends:
  count: 4
  profile:
    name: homogeneous
    weight: 1.0
    max_concurrent_requests: 4
    kv_cache_capacity_tokens: 100000
    service_time_ms:
      ttft_mean: 140
      ttft_jitter_ms: 15
      decode_jitter_ms: 3
      prefill_tokens_per_s: 5000
      decode_tokens_per_s: 100
    registration:
      last_mean_input_tps: 140

traffic_pattern:
  kind: uniform
  routing_keys: 0
  cache_affinity_keys: 64
  input_tokens:
    distribution: uniform
    min: 512
    max: 1536
  output_tokens:
    distribution: uniform
    min: 64
    max: 256
  arrival:
    distribution: constant
    interval_ms: 100

algorithms:
  - name: power-of-two
    config:
      default: power-of-two
  - name: round-robin
    config:
      default: round-robin
  - name: random
    config:
      default: random
