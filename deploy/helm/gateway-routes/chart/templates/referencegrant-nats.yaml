{{- if and .Values.nvcfGatewayRoutes.enabled .Values.nvcfGatewayRoutes.routes.nats.enabled }}
---
# ReferenceGrant allows the NATS TCPRoute to reference the NATS Service across
# namespaces when the route is rendered in the Gateway namespace.
apiVersion: gateway.networking.k8s.io/v1beta1
kind: ReferenceGrant
metadata:
  name: allow-tcproute-to-nats
  namespace: {{ .Values.nvcfGatewayRoutes.routes.nats.backend.namespace }}
  labels:
    {{- include "nvcf-gateway.labels" . | nindent 4 }}
spec:
  from:
    - group: gateway.networking.k8s.io
      kind: TCPRoute
      namespace: {{ .Values.nvcfGatewayRoutes.gateways.nats.namespace }}
  to:
    - group: ""
      kind: Service
{{- end }}
